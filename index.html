<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Printable Job Grid</title>
<style>
  body{font-family:Arial, sans-serif; margin:20px;}
  .controls{margin-bottom:20px;}
  input, button, textarea{padding:6px; margin-top:6px;}

  table{width:100%; border-collapse:collapse; table-layout:fixed;}
  th, td{border:1px solid #000; text-align:center; vertical-align:top;}

  th{
    background:#f0f0f0;
    padding:8px;
    font-weight:bold;
    font-size:14px;
  }

  td{
    height:1.2in;
    position:relative;
    padding:4px;
  }

  th[contenteditable]{outline:none}

  .location-box{
    position:absolute;
    top:4px;
    right:4px;
    border:1px solid #000;
    font-size:10px;
    padding:2px 4px;
    background:#fff;
    font-weight:bold;
    min-width:22px;
  }

  @media print{
    body{margin:0}
    .controls{display:none}

    table{page-break-inside:auto}

    tr{
      page-break-inside:avoid;
      page-break-after:auto;
    }

    @page{
      size:A4 portrait;
      margin:1cm;
    }
  }
</style>
</head>
<body>

<div class="controls">
  <label><strong>Number of columns:</strong></label><br>
  <input type="number" id="colCount" min="1" max="12" value="4" />

  <br><br>

  <label><strong>Enter each person on a new line</strong></label><br>
  <small>Format examples: Sal T200061 9F / Alice ICU / Bob</small><br>
  <textarea id="entries" rows="12" cols="50" placeholder="Sal T200061 9F\nBob C123456 1B\nAlice ICU\nJohn"></textarea>

  <br><br>

  <button onclick="generateGrid()">Generate Grid</button>
  <button onclick="copyYesterday()">Copy Yesterday's List</button>
  <button onclick="window.print()">Print</button>
</div>

<table id="grid"></table>

<script>

function isWard(token){

  if(!token) return false;

  const t = token.toUpperCase();

  if(/^\d+[A-Z]$/.test(t)) return true;

  const wards = [
    'AMU','ICU','HDU','CCU','ED','ER','NICU','PICU','MICU'
  ];

  if(wards.includes(t)) return true;

  return false;
}

function wardSortValue(ward){

  if(!ward) return 9999;

  const w = ward.toUpperCase();

  const match = w.match(/^(\d+)([A-Z])$/);

  if(match){
    const floor = parseInt(match[1]);
    const letter = match[2].charCodeAt(0) - 65;
    return floor * 100 + letter;
  }

  const special = {
    AMU:8000,
    ED:8100,
    ICU:8200,
    HDU:8300,
    CCU:8400,
    NICU:8500,
    PICU:8600,
    MICU:8700
  };

  if(special[w]) return special[w];

  return 9000;
}

function generateGrid(){

  const entriesText = document.getElementById('entries').value;

  localStorage.setItem('yesterdayList', entriesText);

  const entries = entriesText
    .split('\n')
    .map(e=>e.trim())
    .filter(e=>e.length>0);

  const colCount = parseInt(document.getElementById('colCount').value);

  let parsed = entries.map(line => {

    const parts = line.split(/\s+/);

    let name = line;
    let location = '';

    if(parts.length > 1){

      const last = parts[parts.length-1];

      if(isWard(last)){
        location = last.toUpperCase();
        name = parts.slice(0, parts.length-1).join(' ');
      }

    }

    return {name, location};

  });

  const groups = {};

  parsed.forEach(p => {

    const key = p.location || 'Other';

    if(!groups[key]) groups[key] = [];

    groups[key].push(p);

  });

  const sortedWards = Object.keys(groups).sort((a,b)=>{

    if(a === 'Other') return 1;
    if(b === 'Other') return -1;

    return wardSortValue(a) - wardSortValue(b);

  });

  parsed = sortedWards.flatMap(w => groups[w]);

  const table = document.getElementById('grid');
  table.innerHTML='';

  let index = 0;

  while(index < parsed.length){

    const headerRow = document.createElement('tr');
    const jobRow = document.createElement('tr');

    for(let c=0;c<colCount;c++){

      const person = parsed[index];

      const th = document.createElement('th');
      th.contentEditable = true;
      th.textContent = person ? person.name : '';
      headerRow.appendChild(th);

      const td = document.createElement('td');

      if(person && person.location){

        const loc = document.createElement('div');
        loc.className = 'location-box';
        loc.contentEditable = true;
        loc.textContent = person.location;
        td.appendChild(loc);

      }

      jobRow.appendChild(td);

      index++;

    }

    table.appendChild(headerRow);
    table.appendChild(jobRow);

  }

}

function copyYesterday(){

  const saved = localStorage.getItem('yesterdayList');

  if(saved){
    document.getElementById('entries').value = saved;
  } else {
    alert('No previous list saved yet.');
  }

}

</script>

</body>
</html>
